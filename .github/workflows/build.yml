name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build with Buildozer
      uses: ArtemSBulgakov/buildozer-action@v1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ToDoList-APK
        path: bin/*.apk
